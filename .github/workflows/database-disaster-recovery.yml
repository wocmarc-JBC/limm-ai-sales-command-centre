name: Database Disaster Recovery

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/database-disaster-recovery.yml"
  schedule:
    - cron: "30 18 * * *"
    - cron: "45 18 1 * *"
  workflow_dispatch:
    inputs:
      action:
        description: Recovery operation to run
        required: true
        type: choice
        default: backup
        options:
          - backup
          - restore_drill

permissions:
  contents: read

concurrency:
  group: database-disaster-recovery
  cancel-in-progress: false

jobs:
  configuration:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      ready: ${{ steps.guard.outputs.ready }}
    env:
      DR_DATABASE_URL: ${{ secrets.DR_DATABASE_URL }}
      DR_BACKUP_PASSPHRASE: ${{ secrets.DR_BACKUP_PASSPHRASE }}
      DR_S3_ENDPOINT: "https://4563b1bed738ba84a7445e35b9f59c4b.r2.cloudflarestorage.com"
      DR_S3_REGION: "auto"
      DR_S3_BUCKET: "limm-dr-primary"
      AWS_ACCESS_KEY_ID: ${{ secrets.DR_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DR_S3_SECRET_ACCESS_KEY }}
      RELIABILITY_EVIDENCE_TOKEN: ${{ secrets.RELIABILITY_EVIDENCE_TOKEN }}
      RELIABILITY_EVIDENCE_URL: "https://limm-ai-sales-command-centre.vercel.app/api/operations/database-recovery-evidence"
    steps:
      - id: guard
        name: Fail-closed configuration guard
        shell: bash
        run: |
          required=(DR_DATABASE_URL DR_BACKUP_PASSPHRASE DR_S3_ENDPOINT DR_S3_REGION DR_S3_BUCKET AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY RELIABILITY_EVIDENCE_TOKEN RELIABILITY_EVIDENCE_URL)
          missing=0
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              missing=$((missing + 1))
            fi
          done
          if [[ "$missing" -gt 0 ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Database DR remains fail-closed because $missing required secret or variable values are absent."
            echo "Database DR not configured; no readiness evidence was created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Database DR configuration guard passed without exposing secret values." >> "$GITHUB_STEP_SUMMARY"
          fi

  backup:
    needs: configuration
    if: >-
      needs.configuration.outputs.ready == 'true' &&
      ((github.event_name == 'schedule' && github.event.schedule == '30 18 * * *') ||
      (github.event_name == 'schedule' && github.event.schedule == '45 18 1 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'backup') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'restore_drill') ||
      github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DR_DATABASE_URL: ${{ secrets.DR_DATABASE_URL }}
      DR_BACKUP_PASSPHRASE: ${{ secrets.DR_BACKUP_PASSPHRASE }}
      DR_S3_ENDPOINT: "https://4563b1bed738ba84a7445e35b9f59c4b.r2.cloudflarestorage.com"
      DR_S3_REGION: "auto"
      DR_S3_BUCKET: "limm-dr-primary"
      AWS_ACCESS_KEY_ID: ${{ secrets.DR_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DR_S3_SECRET_ACCESS_KEY }}
      RELIABILITY_EVIDENCE_TOKEN: ${{ secrets.RELIABILITY_EVIDENCE_TOKEN }}
      RELIABILITY_EVIDENCE_URL: "https://limm-ai-sales-command-centre.vercel.app/api/operations/database-recovery-evidence"
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Prepare run identity
        shell: bash
        run: |
          echo "DR_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "DR_EXTERNAL_RUN_ID=github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-backup" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/limm-db-dr"

      - name: Resolve assigned Supabase pooler safely
        shell: bash
        run: |
          database_user="${DR_DATABASE_URL#*://}"
          database_user="${database_user%%:*}"
          current_host="${DR_DATABASE_URL#*@}"
          current_host="${current_host%%:*}"
          pooler_region="${current_host#aws-}"
          pooler_region="${pooler_region#*-}"
          pooler_region="${pooler_region%.pooler.supabase.com}"
          if [[ "$database_user" != postgres.* || -z "$pooler_region" || "$current_host" != aws-*.pooler.supabase.com ]]; then
            echo "::error::Full-scope recovery requires the project postgres shared-pooler URL; a scoped application role cannot read Supabase-managed Auth and Storage data."
            exit 1
          fi

          resolved_host=""
          for shard in 0 1 2 3; do
            candidate="aws-${shard}-${pooler_region}.pooler.supabase.com"
            if probe_output=$(docker run --rm --network host \
              -e PGPASSWORD="limm-intentional-invalid-probe-only" \
              postgres:17-alpine \
              psql "host=${candidate} port=5432 dbname=postgres user=${database_user} sslmode=require connect_timeout=5" \
              -v ON_ERROR_STOP=1 -Atc "select 1" 2>&1); then
              echo "::error::Pooler probe unexpectedly authenticated."
              exit 1
            fi
            if grep -Eiq "password authentication failed|SASL" <<< "$probe_output"; then
              resolved_host="$candidate"
              break
            fi
            if grep -Eiq "tenant.*user.*not found|tenant or user not found|could not translate host name" <<< "$probe_output"; then
              continue
            fi
            echo "::notice::Pooler candidate ${candidate} returned a non-matching rejection."
          done

          if [[ -z "$resolved_host" ]]; then
            echo "::error::Unable to resolve the assigned Supabase pooler shard without using the real credential."
            exit 1
          fi

          normalized_url="${DR_DATABASE_URL/@${current_host}:/@${resolved_host}:}"
          if [[ "$normalized_url" != *"@${resolved_host}:"* ]]; then
            echo "::error::Resolved pooler host could not be applied to the scoped database URL."
            exit 1
          fi
          echo "::add-mask::$normalized_url"
          printf 'DR_DATABASE_URL=%s\n' "$normalized_url" >> "$GITHUB_ENV"
          echo "Supabase pooler shard resolved without sending the real database credential to guessed hosts." >> "$GITHUB_STEP_SUMMARY"

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Create portable full-scope Supabase dump bundle
        shell: bash
        run: |
          supabase db dump --db-url "$DR_DATABASE_URL" \
            --file "$RUNNER_TEMP/limm-db-dr/roles.sql" --role-only
          supabase db dump --db-url "$DR_DATABASE_URL" \
            --file "$RUNNER_TEMP/limm-db-dr/schema.sql"
          supabase db dump --db-url "$DR_DATABASE_URL" \
            --file "$RUNNER_TEMP/limm-db-dr/data.sql" --use-copy --data-only \
            --exclude "storage.buckets_vectors" --exclude "storage.vector_indexes"
          supabase db dump --db-url "$DR_DATABASE_URL" \
            --file "$RUNNER_TEMP/limm-db-dr/history_schema.sql" --schema supabase_migrations
          supabase db dump --db-url "$DR_DATABASE_URL" \
            --file "$RUNNER_TEMP/limm-db-dr/history_data.sql" --schema supabase_migrations --use-copy --data-only

          for file in roles.sql schema.sql data.sql history_schema.sql history_data.sql; do
            test -s "$RUNNER_TEMP/limm-db-dr/$file"
          done
          grep -Eq '^COPY "auth"\."users" \(.*"encrypted_password"' "$RUNNER_TEMP/limm-db-dr/data.sql"
          grep -Eq '^COPY "auth"\."identities" ' "$RUNNER_TEMP/limm-db-dr/data.sql"
          grep -Eq '^COPY "storage"\."buckets" ' "$RUNNER_TEMP/limm-db-dr/data.sql"
          grep -Eq '^COPY "storage"\."objects" ' "$RUNNER_TEMP/limm-db-dr/data.sql"

          count_copy_rows() {
            local schema="$1"
            local table="$2"
            awk -v schema="$schema" -v table="$table" '
              BEGIN {
                prefix = "COPY \"" schema "\".\"" table "\" ("
                found = 0
                copying = 0
                done = 0
                count = 0
              }
              index($0, prefix) == 1 { found = 1; copying = 1; next }
              copying && $0 == "\\." { print count; done = 1; exit }
              copying { count += 1 }
              END { if (!found || !done) exit 2 }
            ' "$RUNNER_TEMP/limm-db-dr/data.sql"
          }

          while read -r name schema table; do
            value=$(count_copy_rows "$schema" "$table")
            [[ "$value" =~ ^[0-9]+$ ]]
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          done <<'COUNTS'
          DR_PROFILE_COUNT public profiles
          DR_LEAD_COUNT public leads
          DR_MESSAGE_COUNT public lead_messages
          DR_AUDIT_COUNT public audit_logs
          DR_INBOUND_JOB_COUNT public whatsapp_inbound_jobs
          DR_AUTH_USER_COUNT auth users
          DR_AUTH_IDENTITY_COUNT auth identities
          DR_STORAGE_BUCKET_COUNT storage buckets
          DR_STORAGE_OBJECT_COUNT storage objects
          COUNTS

          tar -C "$RUNNER_TEMP/limm-db-dr" -czf "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz" \
            roles.sql schema.sql data.sql history_schema.sql history_data.sql
          echo "The encrypted artifact contains business data, Auth users and password hashes, Storage metadata, roles, schema, and migration history. Storage object bytes remain protected by the separate client-file R2 backup." >> "$GITHUB_STEP_SUMMARY"

      - name: Encrypt and checksum artifact
        shell: bash
        run: |
          openssl enc -aes-256-cbc -pbkdf2 -iter 200000 -salt \
            -in "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz" \
            -out "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc" \
            -pass env:DR_BACKUP_PASSPHRASE
          rm "$RUNNER_TEMP/limm-db-dr/roles.sql" \
            "$RUNNER_TEMP/limm-db-dr/schema.sql" \
            "$RUNNER_TEMP/limm-db-dr/data.sql" \
            "$RUNNER_TEMP/limm-db-dr/history_schema.sql" \
            "$RUNNER_TEMP/limm-db-dr/history_data.sql" \
            "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz"
          sha=$(sha256sum "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc" | cut -d ' ' -f 1)
          bytes=$(stat -c %s "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc")
          object_key="database-backups/$(date -u +%Y/%m/%d)/limm-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.tar.gz.enc"
          echo "DR_ARTIFACT_SHA256=$sha" >> "$GITHUB_ENV"
          echo "DR_ARTIFACT_BYTES=$bytes" >> "$GITHUB_ENV"
          echo "DR_OBJECT_KEY=$object_key" >> "$GITHUB_ENV"

      - name: Upload encrypted artifact and latest manifest
        shell: bash
        run: |
          aws s3 cp "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc" "s3://${DR_S3_BUCKET}/${DR_OBJECT_KEY}" \
            --endpoint-url "$DR_S3_ENDPOINT" --region "$DR_S3_REGION" --no-progress
          completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg externalRunId "$DR_EXTERNAL_RUN_ID" \
            --arg objectKey "$DR_OBJECT_KEY" \
            --arg sha256 "$DR_ARTIFACT_SHA256" \
            --arg completedAt "$completed_at" \
            --argjson bytes "$DR_ARTIFACT_BYTES" \
            --argjson profiles "$DR_PROFILE_COUNT" \
            --argjson leads "$DR_LEAD_COUNT" \
            --argjson leadMessages "$DR_MESSAGE_COUNT" \
            --argjson auditLogs "$DR_AUDIT_COUNT" \
            --argjson whatsappInboundJobs "$DR_INBOUND_JOB_COUNT" \
            --argjson authUsers "$DR_AUTH_USER_COUNT" \
            --argjson authIdentities "$DR_AUTH_IDENTITY_COUNT" \
            --argjson storageBuckets "$DR_STORAGE_BUCKET_COUNT" \
            --argjson storageObjects "$DR_STORAGE_OBJECT_COUNT" \
            '{schemaVersion:"limm-database-backup-v3",databaseScope:"full_database",managedAuthIncluded:true,managedStorageIncluded:true,externalRunId:$externalRunId,objectKey:$objectKey,sha256:$sha256,bytes:$bytes,completedAt:$completedAt,encrypted:true,format:"supabase_cli_portable_sql_bundle",rowCounts:{profiles:$profiles,leads:$leads,leadMessages:$leadMessages,auditLogs:$auditLogs,whatsappInboundJobs:$whatsappInboundJobs,authUsers:$authUsers,authIdentities:$authIdentities,storageBuckets:$storageBuckets,storageObjects:$storageObjects}}' \
            > "$RUNNER_TEMP/limm-db-dr/latest.json"
          aws s3 cp "$RUNNER_TEMP/limm-db-dr/latest.json" "s3://${DR_S3_BUCKET}/database-backups/latest.json" \
            --endpoint-url "$DR_S3_ENDPOINT" --region "$DR_S3_REGION" --no-progress

      - name: Record successful backup evidence
        shell: bash
        run: |
          completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg externalRunId "$DR_EXTERNAL_RUN_ID" \
            --arg artifactSha256 "$DR_ARTIFACT_SHA256" \
            --arg startedAt "$DR_STARTED_AT" \
            --arg completedAt "$completed_at" \
            --arg workflowRunId "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commitSha "$GITHUB_SHA" \
            --argjson artifactSizeBytes "$DR_ARTIFACT_BYTES" \
            --argjson workflowRunAttempt "$GITHUB_RUN_ATTEMPT" \
            '{externalRunId:$externalRunId,runType:"backup",status:"succeeded",provider:"independent_pg_dump_s3_full_managed_schemas",databaseScope:"full_database",managedAuthIncluded:true,managedStorageIncluded:true,artifactSha256:$artifactSha256,artifactSizeBytes:$artifactSizeBytes,isolatedRestore:false,schemaChecksPassed:0,rowChecksPassed:0,errorCode:"",startedAt:$startedAt,completedAt:$completedAt,workflowRunId:$workflowRunId,workflowRunAttempt:$workflowRunAttempt,repository:$repository,commitSha:$commitSha,encrypted:true,compression:"tar_gzip_portable_sql"}' \
            > "$RUNNER_TEMP/limm-db-dr/evidence.json"
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${RELIABILITY_EVIDENCE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "@$RUNNER_TEMP/limm-db-dr/evidence.json" \
            "$RELIABILITY_EVIDENCE_URL"

      - name: Record failed backup evidence
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg externalRunId "${DR_EXTERNAL_RUN_ID:-github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-backup}" \
            --arg startedAt "${DR_STARTED_AT:-$completed_at}" \
            --arg completedAt "$completed_at" \
            --arg workflowRunId "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commitSha "$GITHUB_SHA" \
            --argjson workflowRunAttempt "$GITHUB_RUN_ATTEMPT" \
            '{externalRunId:$externalRunId,runType:"backup",status:"failed",provider:"independent_pg_dump_s3_full_managed_schemas",databaseScope:"full_database",managedAuthIncluded:true,managedStorageIncluded:true,artifactSha256:"",artifactSizeBytes:0,isolatedRestore:false,schemaChecksPassed:0,rowChecksPassed:0,errorCode:"workflow_backup_failed",startedAt:$startedAt,completedAt:$completedAt,workflowRunId:$workflowRunId,workflowRunAttempt:$workflowRunAttempt,repository:$repository,commitSha:$commitSha,encrypted:true,compression:"tar_gzip_portable_sql"}' \
            > "$RUNNER_TEMP/limm-db-dr/failed-evidence.json"
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${RELIABILITY_EVIDENCE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "@$RUNNER_TEMP/limm-db-dr/failed-evidence.json" \
            "$RELIABILITY_EVIDENCE_URL"

  restore-drill:
    needs:
      - configuration
      - backup
    if: >-
      needs.configuration.outputs.ready == 'true' &&
      ((github.event_name == 'schedule' && github.event.schedule == '45 18 1 * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'restore_drill') ||
      github.event_name == 'push')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DR_BACKUP_PASSPHRASE: ${{ secrets.DR_BACKUP_PASSPHRASE }}
      DR_S3_ENDPOINT: "https://4563b1bed738ba84a7445e35b9f59c4b.r2.cloudflarestorage.com"
      DR_S3_REGION: "auto"
      DR_S3_BUCKET: "limm-dr-primary"
      AWS_ACCESS_KEY_ID: ${{ secrets.DR_S3_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.DR_S3_SECRET_ACCESS_KEY }}
      RELIABILITY_EVIDENCE_TOKEN: ${{ secrets.RELIABILITY_EVIDENCE_TOKEN }}
      RELIABILITY_EVIDENCE_URL: "https://limm-ai-sales-command-centre.vercel.app/api/operations/database-recovery-evidence"
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - name: Prepare isolated restore drill
        shell: bash
        run: |
          echo "DR_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"
          echo "DR_EXTERNAL_RUN_ID=github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-restore" >> "$GITHUB_ENV"
          mkdir -p "$RUNNER_TEMP/limm-db-dr"
          aws s3 cp "s3://${DR_S3_BUCKET}/database-backups/latest.json" "$RUNNER_TEMP/limm-db-dr/latest.json" \
            --endpoint-url "$DR_S3_ENDPOINT" --region "$DR_S3_REGION" --no-progress
          jq -e '
            .schemaVersion == "limm-database-backup-v3" and
            .databaseScope == "full_database" and
            .managedAuthIncluded == true and
            .managedStorageIncluded == true and
            .format == "supabase_cli_portable_sql_bundle" and
            .encrypted == true and
            ([.rowCounts.profiles,.rowCounts.leads,.rowCounts.leadMessages,.rowCounts.auditLogs,.rowCounts.whatsappInboundJobs,.rowCounts.authUsers,.rowCounts.authIdentities,.rowCounts.storageBuckets,.rowCounts.storageObjects] | all(type == "number" and . >= 0))
          ' "$RUNNER_TEMP/limm-db-dr/latest.json" > /dev/null
          object_key=$(jq -r '.objectKey' "$RUNNER_TEMP/limm-db-dr/latest.json")
          sha=$(jq -r '.sha256' "$RUNNER_TEMP/limm-db-dr/latest.json")
          bytes=$(jq -r '.bytes' "$RUNNER_TEMP/limm-db-dr/latest.json")
          source_run=$(jq -r '.externalRunId' "$RUNNER_TEMP/limm-db-dr/latest.json")
          [[ "$object_key" == database-backups/*.tar.gz.enc ]] && [[ "$sha" =~ ^[a-f0-9]{64}$ ]] && [[ "$bytes" =~ ^[0-9]+$ ]]
          echo "DR_OBJECT_KEY=$object_key" >> "$GITHUB_ENV"
          echo "DR_ARTIFACT_SHA256=$sha" >> "$GITHUB_ENV"
          echo "DR_ARTIFACT_BYTES=$bytes" >> "$GITHUB_ENV"
          echo "DR_SOURCE_BACKUP_RUN_ID=$source_run" >> "$GITHUB_ENV"
          while read -r name path; do
            value=$(jq -r "$path" "$RUNNER_TEMP/limm-db-dr/latest.json")
            [[ "$value" =~ ^[0-9]+$ ]]
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          done <<'COUNTS'
          DR_PROFILE_COUNT .rowCounts.profiles
          DR_LEAD_COUNT .rowCounts.leads
          DR_MESSAGE_COUNT .rowCounts.leadMessages
          DR_AUDIT_COUNT .rowCounts.auditLogs
          DR_INBOUND_JOB_COUNT .rowCounts.whatsappInboundJobs
          DR_AUTH_USER_COUNT .rowCounts.authUsers
          DR_AUTH_IDENTITY_COUNT .rowCounts.authIdentities
          DR_STORAGE_BUCKET_COUNT .rowCounts.storageBuckets
          DR_STORAGE_OBJECT_COUNT .rowCounts.storageObjects
          COUNTS

      - name: Download, verify, and decrypt backup
        shell: bash
        run: |
          aws s3 cp "s3://${DR_S3_BUCKET}/${DR_OBJECT_KEY}" "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc" \
            --endpoint-url "$DR_S3_ENDPOINT" --region "$DR_S3_REGION" --no-progress
          echo "${DR_ARTIFACT_SHA256}  $RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc" | sha256sum --check --strict
          test "$(stat -c %s "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc")" = "$DR_ARTIFACT_BYTES"
          openssl enc -d -aes-256-cbc -pbkdf2 -iter 200000 \
            -in "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz.enc" \
            -out "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz" \
            -pass env:DR_BACKUP_PASSPHRASE
          test -s "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz"
          archive_entries=$(tar -tzf "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz" | sort)
          expected_entries=$(printf '%s\n' data.sql history_data.sql history_schema.sql roles.sql schema.sql | sort)
          test "$archive_entries" = "$expected_entries"
          tar -xzf "$RUNNER_TEMP/limm-db-dr/database-backup.tar.gz" -C "$RUNNER_TEMP/limm-db-dr"
          for file in roles.sql schema.sql data.sql history_schema.sql history_data.sql; do
            test -s "$RUNNER_TEMP/limm-db-dr/$file"
          done

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.1

      - name: Restore into isolated Supabase PostgreSQL and verify contracts
        shell: bash
        run: |
          target="$RUNNER_TEMP/limm-db-restore-target"
          cleanup() { supabase stop --workdir "$target" --no-backup --yes >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          mkdir -p "$target"
          supabase init --workdir "$target" --yes
          mkdir -p "$target/supabase/.temp"
          printf '%s\n' '17.6.1.127' > "$target/supabase/.temp/postgres-version"
          supabase db start --workdir "$target" --yes
          restore_url="postgresql://postgres:postgres@127.0.0.1:54322/postgres"

          docker run --rm --network host -v "$RUNNER_TEMP/limm-db-dr:/work:ro" postgres:17-alpine \
            psql "$restore_url" --single-transaction --variable ON_ERROR_STOP=1 \
              --file /work/roles.sql \
              --file /work/schema.sql \
              --command 'SET session_replication_role = replica' \
              --file /work/data.sql
          docker run --rm --network host -v "$RUNNER_TEMP/limm-db-dr:/work:ro" postgres:17-alpine \
            psql "$restore_url" --single-transaction --variable ON_ERROR_STOP=1 \
              --file /work/history_schema.sql \
              --file /work/history_data.sql

          schema_contracts=$(docker run --rm --network host postgres:17-alpine psql "$restore_url" -v ON_ERROR_STOP=1 -AtF '|' -c \
            "select (select count(*) from information_schema.tables where table_schema='public' and table_name in ('profiles','leads','lead_messages','audit_logs','whatsapp_inbound_jobs','client_file_recovery_runs')),(select count(*) from information_schema.tables where table_schema='auth' and table_name in ('users','identities','sessions','refresh_tokens')),(select count(*) from information_schema.tables where table_schema='storage' and table_name in ('buckets','objects')),(select count(*) from pg_constraint where conname='profiles_auth_user_fk' and conrelid='public.profiles'::regclass and confrelid='auth.users'::regclass),(select count(*) from public.profiles p left join auth.users u on u.id=p.id where u.id is null),(select count(*) from pg_proc p join pg_namespace n on n.oid=p.pronamespace where n.nspname='limm_private' and p.proname in ('broadcast_inbox_activity','dispatch_client_file_integrity','dispatch_reliability_endpoint','dispatch_reliability_watchdog','dispatch_whatsapp_worker','prune_reliability_history')),(select count(*) from pg_trigger t join pg_proc p on p.oid=t.tgfoid join pg_namespace n on n.oid=p.pronamespace where not t.tgisinternal and n.nspname='limm_private' and p.proname='broadcast_inbox_activity'),(select count(*) from auth.users where coalesce(length(encrypted_password),0)>0),(select count(*) from supabase_migrations.schema_migrations);")
          IFS='|' read -r required auth_tables storage_tables dependency_contract missing_profiles private_functions broadcast_triggers password_credentials migration_history <<< "$schema_contracts"
          test "$required" = "6"
          test "$auth_tables" = "4"
          test "$storage_tables" = "2"
          test "$dependency_contract" = "1"
          test "$missing_profiles" = "0"
          test "$private_functions" = "6"
          test "$broadcast_triggers" = "5"
          test "$password_credentials" -gt 0
          test "$migration_history" -gt 0

          restored_counts=$(docker run --rm --network host postgres:17-alpine psql "$restore_url" -v ON_ERROR_STOP=1 -AtF '|' -c \
            "select (select count(*) from public.profiles),(select count(*) from public.leads),(select count(*) from public.lead_messages),(select count(*) from public.audit_logs),(select count(*) from public.whatsapp_inbound_jobs),(select count(*) from auth.users),(select count(*) from auth.identities),(select count(*) from storage.buckets),(select count(*) from storage.objects);")
          IFS='|' read -r profiles leads messages audits inbound_jobs auth_users auth_identities storage_buckets storage_objects <<< "$restored_counts"
          test "$profiles" = "$DR_PROFILE_COUNT"
          test "$leads" = "$DR_LEAD_COUNT"
          test "$messages" = "$DR_MESSAGE_COUNT"
          test "$audits" = "$DR_AUDIT_COUNT"
          test "$inbound_jobs" = "$DR_INBOUND_JOB_COUNT"
          test "$auth_users" = "$DR_AUTH_USER_COUNT"
          test "$auth_identities" = "$DR_AUTH_IDENTITY_COUNT"
          test "$storage_buckets" = "$DR_STORAGE_BUCKET_COUNT"
          test "$storage_objects" = "$DR_STORAGE_OBJECT_COUNT"
          echo "DR_SCHEMA_CHECKS=9" >> "$GITHUB_ENV"
          echo "DR_ROW_CHECKS=9" >> "$GITHUB_ENV"
          echo "Business data, Auth users/password credentials, Storage metadata, and migration history restored into an isolated Supabase PostgreSQL target with source-artifact row counts matched. Storage object bytes remain covered by the separate client-file restore drill." >> "$GITHUB_STEP_SUMMARY"

      - name: Record successful restore evidence
        shell: bash
        run: |
          completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg externalRunId "$DR_EXTERNAL_RUN_ID" \
            --arg sourceBackupExternalRunId "$DR_SOURCE_BACKUP_RUN_ID" \
            --arg artifactSha256 "$DR_ARTIFACT_SHA256" \
            --arg startedAt "$DR_STARTED_AT" \
            --arg completedAt "$completed_at" \
            --arg workflowRunId "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commitSha "$GITHUB_SHA" \
            --argjson artifactSizeBytes "$DR_ARTIFACT_BYTES" \
            --argjson schemaChecksPassed "$DR_SCHEMA_CHECKS" \
            --argjson rowChecksPassed "$DR_ROW_CHECKS" \
            --argjson workflowRunAttempt "$GITHUB_RUN_ATTEMPT" \
            '{externalRunId:$externalRunId,runType:"restore_drill",status:"succeeded",provider:"independent_pg_dump_s3_full_managed_schemas",databaseScope:"full_database",managedAuthIncluded:true,managedStorageIncluded:true,artifactSha256:$artifactSha256,artifactSizeBytes:$artifactSizeBytes,sourceBackupExternalRunId:$sourceBackupExternalRunId,isolatedRestore:true,schemaChecksPassed:$schemaChecksPassed,rowChecksPassed:$rowChecksPassed,errorCode:"",startedAt:$startedAt,completedAt:$completedAt,workflowRunId:$workflowRunId,workflowRunAttempt:$workflowRunAttempt,repository:$repository,commitSha:$commitSha,encrypted:true,compression:"tar_gzip_portable_sql"}' \
            > "$RUNNER_TEMP/limm-db-dr/evidence.json"
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${RELIABILITY_EVIDENCE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "@$RUNNER_TEMP/limm-db-dr/evidence.json" \
            "$RELIABILITY_EVIDENCE_URL"

      - name: Record failed restore evidence
        if: failure()
        continue-on-error: true
        shell: bash
        run: |
          completed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          jq -n \
            --arg externalRunId "${DR_EXTERNAL_RUN_ID:-github-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-restore}" \
            --arg startedAt "${DR_STARTED_AT:-$completed_at}" \
            --arg completedAt "$completed_at" \
            --arg workflowRunId "$GITHUB_RUN_ID" \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg commitSha "$GITHUB_SHA" \
            --argjson workflowRunAttempt "$GITHUB_RUN_ATTEMPT" \
            '{externalRunId:$externalRunId,runType:"restore_drill",status:"failed",provider:"independent_pg_dump_s3_full_managed_schemas",databaseScope:"full_database",managedAuthIncluded:true,managedStorageIncluded:true,artifactSha256:"",artifactSizeBytes:0,isolatedRestore:false,schemaChecksPassed:0,rowChecksPassed:0,errorCode:"workflow_restore_failed",startedAt:$startedAt,completedAt:$completedAt,workflowRunId:$workflowRunId,workflowRunAttempt:$workflowRunAttempt,repository:$repository,commitSha:$commitSha,encrypted:true,compression:"tar_gzip_portable_sql"}' \
            > "$RUNNER_TEMP/limm-db-dr/failed-evidence.json"
          curl --silent --show-error --fail-with-body \
            -H "Authorization: Bearer ${RELIABILITY_EVIDENCE_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary "@$RUNNER_TEMP/limm-db-dr/failed-evidence.json" \
            "$RELIABILITY_EVIDENCE_URL"
